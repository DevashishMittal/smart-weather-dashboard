<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<meta name="theme-color" content="#1d4ed8">

<title>Smart Weather AI Dashboard</title>

<!-- Bootstrap -->

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<!-- Google Font -->

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>

<!-- CSS -->

<link
rel="stylesheet"
href="style.css"
>

<!-- Chart JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Manifest -->

<link
rel="manifest"
href="manifest.json"
>

</head>

<body>

<div class="container py-4">

<div class="main-card">

<!-- HEADER -->

<div class="d-flex justify-content-between align-items-center mb-4">

<h1 class="title">
Smart Weather AI
</h1>

<button
class="btn btn-warning"
onclick="toggleTheme()"
>

🌙 / ☀

</button>

</div>

<!-- SEARCH -->

<div class="input-group mb-3">

<input
type="text"
id="cityInput"
class="form-control search-input"
placeholder="Enter city name"
>

<button
class="btn btn-primary"
onclick="getWeather()"
>

Search

</button>

<button
class="btn btn-success"
onclick="getLocationWeather()"
>

📍

</button>

</div>

<!-- HISTORY -->

<div
id="historyBox"
class="mb-3"
></div>

<!-- LOADER -->

<div
id="loader"
class="loader d-none"
></div>

<!-- LIVE CLOCK -->

<div
class="live-clock"
id="liveClock"
></div>

<!-- ALERT -->

<div
id="alertBox"
class="alert-box mt-3"
></div>

<!-- WEATHER -->

<div
id="weatherBox"
class="mt-4"
></div>

<!-- AI SUGGESTION -->

<div
id="aiBox"
class="mt-3"
></div>

<!-- EXTRA INFO -->

<div class="row mt-4 g-3">

<div class="col-6">

<div class="card extra-card p-3 text-center">

<h6>Air Quality</h6>

<h4 id="aqi">--</h4>

</div>

</div>

<div class="col-6">

<div class="card extra-card p-3 text-center">

<h6>UV Index</h6>

<h4 id="uvIndex">6</h4>

</div>

</div>

</div>

<!-- CHART -->

<div class="chart-container mt-4">

<canvas id="weatherChart"></canvas>

</div>

<!-- FORECAST -->

<div
class="row mt-4 g-3"
id="forecastRow"
></div>

</div>

<!-- FOOTER -->

<div class="text-center mt-4">

<p class="footer-text">
Developed by Devashish Mittal © 2026
</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
